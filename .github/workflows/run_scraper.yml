name: Glassdoor Scraper Daily 8AM

on:
  schedule:
    # 8:00 AM Việt Nam (UTC+7) = 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công khi cần

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      run: python scraper.py

    - name: Commit and Push results
      if: success()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Chỉ đẩy lên nếu file glassdoor_jobs.csv có dữ liệu (dung lượng > 0)
        if [ -s glassdoor_jobs.csv ]; then
          git add glassdoor_jobs.csv
          git commit -m "Auto-update jobs: $(date +'%Y-%m-%d %H:%M')"
          git push origin main
        else
          echo "Không có dữ liệu mới để cập nhật."
        fi