name: Glassdoor Scraper Daily 8AM

on:
  schedule:
    # 8:00 AM Việt Nam (UTC+7) = 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch: # Giữ nút này để bạn có thể bấm chạy thử bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Quan trọng: Cho phép bot ghi file vào Repo của bạn

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      run: python scraper.py

    - name: Commit and Push results
      if: success() # Chỉ chạy nếu bước Run Scraper lấy được dữ liệu thành công
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Kiểm tra nếu file có dữ liệu mới thực hiện commit
        if [ -s glassdoor_jobs.csv ]; then
          git add glassdoor_jobs.csv
          git commit -m "Auto-update jobs: $(date +'%Y-%m-%d %H:%M')"
          git push origin main
        else
          echo "Không có dữ liệu mới hoặc file trống, bỏ qua bước push."
        fi