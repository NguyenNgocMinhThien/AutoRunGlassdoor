name: Glassdoor Scraper Cron

on:
  schedule:
    # Chạy vào lúc 00:00 hàng ngày (giờ UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép nhấn nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Scraper
      run: python scraper.py
      env:
        GLASSDOOR_USER: ${{ secrets.GLASSDOOR_USER }}
        GLASSDOOR_PWD: ${{ secrets.GLASSDOOR_PWD }}
    - name: Commit and Push results
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add glassdoor_jobs.csv
        git commit -m "Auto-update jobs data" || echo "No changes to commit"
        git push